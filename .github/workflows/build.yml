name: Build dashboard data

on:
  schedule:
    # 한국시간(KST) 09:10 = UTC 00:10
    - cron: "10 0 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼 (Actions 탭에서 바로 돌려볼 수 있음)

permissions:
  contents: write          # 갱신된 data/*.json·token.json 을 저장소에 다시 커밋하기 위함

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install requests python-dotenv

      - name: 데이터 생성 (sales / product / inventory)
        env:
          CAFE24_MALL_ID: ${{ secrets.CAFE24_MALL_ID }}
          CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
          CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
        run: python build_data.py

      - name: 갱신된 데이터·토큰 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json token.json
          git diff --staged --quiet || git commit -m "데이터 자동 갱신 ($(date -u +%Y-%m-%dT%H:%M))"
          # 그사이 저장소가 바뀌었어도 push가 거부되지 않도록 최신을 먼저 받아 재시도
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            echo "push 재시도 $i..."
            sleep 3
          done
