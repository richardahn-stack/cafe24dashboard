<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자사몰 그로스 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  :root{
    --bg:#F4F6F9; --card:#FFFFFF; --ink:#1A2233; --muted:#6B7280;
    --new:#2F6FED; --repeat:#16A085; --amber:#E0A800; --danger:#E5484D;
    --border:#E6E9EF; --accent:#2F6FED;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);
       display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
  /* 사이드바 */
  aside{width:220px;background:#10182B;color:#C7D0E0;flex-shrink:0;padding:24px 0;
        display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  aside .brand{font-size:17px;font-weight:700;color:#fff;padding:0 24px 24px}
  aside .brand span{color:var(--new)}
  nav button{display:block;width:100%;text-align:left;background:none;border:none;color:#C7D0E0;
        font-family:inherit;font-size:15px;padding:13px 24px;cursor:pointer;border-left:3px solid transparent}
  nav button:hover{background:#1A2440;color:#fff}
  nav button.active{background:#1A2440;color:#fff;border-left-color:var(--new);font-weight:600}
  aside .foot{margin-top:auto;padding:16px 24px;font-size:12px;color:#5B6680;line-height:1.6}
  /* 메인 */
  main{flex:1;padding:32px 40px;max-width:1280px}
  h1{font-size:24px;font-weight:700;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:24px}
  section.tab{display:none} section.tab.active{display:block}
  h2{font-size:16px;font-weight:600;margin:28px 0 14px}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
  .kpi .label{font-size:13px;color:var(--muted);margin-bottom:6px}
  .kpi .val{font-size:24px;font-weight:700;letter-spacing:-0.5px}
  .kpi .delta{font-size:12px;font-weight:600;margin-top:4px}
  .up{color:var(--repeat)} .down{color:var(--danger)} .flat{color:var(--muted)}
  /* 카드/그리드 */
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
  .row{display:grid;gap:16px}
  .row.c2{grid-template-columns:340px 1fr}
  .legend{font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  /* 메모 */
  .memo-add{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .memo-add input,.memo-add select{font-family:inherit;font-size:14px;padding:8px 10px;
        border:1px solid var(--border);border-radius:8px}
  .memo-add input[type=text]{flex:1;min-width:200px}
  .memo-add button,.btn{font-family:inherit;font-size:14px;font-weight:600;padding:8px 16px;
        background:var(--new);color:#fff;border:none;border-radius:8px;cursor:pointer}
  .memo-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .memo-item{display:flex;align-items:center;gap:10px;font-size:14px;padding:8px 12px;
        background:#FFF9EC;border:1px solid #F0E0B8;border-radius:8px}
  .memo-item .date{font-weight:700;color:#9A7B00}
  .memo-item .del{margin-left:auto;color:var(--muted);background:none;border:none;cursor:pointer;font-size:13px}
  .note{font-size:12px;color:var(--muted);margin-top:8px}
  /* 표 */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .pill.red{background:#FCE8E9;color:var(--danger)}
  .pill.amber{background:#FFF4D6;color:#9A7B00}
  canvas{max-width:100%}
  .empty{color:var(--muted);padding:40px;text-align:center;background:var(--card);
        border:1px dashed var(--border);border-radius:14px}
</style>
</head>
<body>
<aside>
  <div class="brand">자사몰 <span>그로스</span></div>
  <nav>
    <button data-tab="sales" class="active">매출 대시보드</button>
    <button data-tab="product">상품 대시보드</button>
    <button data-tab="inventory">재고 대시보드</button>
  </nav>
  <div class="foot" id="updated">데이터 로딩 중…</div>
</aside>

<main>
  <!-- 매출 -->
  <section class="tab active" id="sales">
    <h1>매출 대시보드</h1>
    <div class="sub" id="sales-period"></div>
    <div class="kpis" id="sales-kpis"></div>

    <h2>신규 구매 vs 재구매</h2>
    <div class="row c2">
      <div class="card">
        <canvas id="pieChart" height="220"></canvas>
        <div class="legend">
          <span><span class="dot" style="background:var(--new)"></span>신규 구매</span>
          <span><span class="dot" style="background:var(--repeat)"></span>재구매</span>
        </div>
      </div>
      <div class="card" id="delta-card"></div>
    </div>

    <h2>일별 매출 추이 (신규/재구매 누적)</h2>
    <div class="card">
      <canvas id="dailyChart" height="110"></canvas>
      <div class="memo-add">
        <select id="memo-date"></select>
        <input type="text" id="memo-text" placeholder="이 날 무슨 일이 있었나요? (예: 라이브방송, 광고집행)">
        <button id="memo-add-btn">메모 추가</button>
      </div>
      <div class="memo-list" id="memo-list"></div>
      <div class="note" id="memo-note"></div>
    </div>
  </section>

  <!-- 상품 -->
  <section class="tab" id="product">
    <h1>상품 대시보드</h1>
    <div class="sub" id="product-period"></div>
    <h2>카테고리 비중 (매출)</h2>
    <div class="row c2">
      <div class="card"><canvas id="catChart" height="220"></canvas></div>
      <div class="card"><canvas id="modelChart" height="220"></canvas></div>
    </div>
    <h2>상품별 매출 순위 TOP 20</h2>
    <div class="card"><table id="rankTable"></table></div>
  </section>

  <!-- 재고 -->
  <section class="tab" id="inventory">
    <h1>재고 대시보드</h1>
    <div class="sub" id="inv-updated"></div>
    <div class="kpis" id="inv-kpis"></div>
    <h2>품절 임박 경보 (90일 내 소진)</h2>
    <div class="card"><table id="soonTable"></table></div>
    <h2>부진 재고 (재고 있으나 최근 30일 판매 0)</h2>
    <div class="card"><table id="stagnantTable"></table></div>
  </section>
</main>

<script>
/* ===== JSONBin 메모 설정 (메타 대시보드 때처럼 채우세요) ===== */
const JSONBIN = {
  binId: "",      // 예: "65a1b2c3..."  비워두면 이 브라우저에만 저장됩니다.
  apiKey: ""      // 예: "$2a$10$..."  (X-Master-Key)
};

/* ===== 유틸 ===== */
const won = n => "₩" + Math.round(n).toLocaleString("ko-KR");
const wonShort = n => {
  if (n >= 1e8) return "₩" + (n/1e8).toFixed(1) + "억";
  if (n >= 1e4) return "₩" + Math.round(n/1e4).toLocaleString() + "만";
  return "₩" + Math.round(n).toLocaleString();
};
const mmdd = d => d.slice(5).replace("-", "/");
const deltaHtml = v => {
  if (v === null || v === undefined) return '<span class="delta flat">— 비교불가</span>';
  const cls = v > 0 ? "up" : (v < 0 ? "down" : "flat");
  const arw = v > 0 ? "▲" : (v < 0 ? "▼" : "─");
  return `<span class="delta ${cls}">${arw} ${v > 0 ? "+" : ""}${v}%</span>`;
};
async function getJSON(path){ const r = await fetch(path); if(!r.ok) throw new Error(path); return r.json(); }

/* ===== 탭 전환 ===== */
document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll("nav button").forEach(x => x.classList.remove("active"));
  document.querySelectorAll("section.tab").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById(b.dataset.tab).classList.add("active");
});

/* ===== 매출 탭 ===== */
let dailyChart, salesData;
async function renderSales(){
  let d;
  try { d = await getJSON("data/sales.json"); } catch(e){
    document.getElementById("sales").innerHTML = '<h1>매출 대시보드</h1><div class="empty">data/sales.json을 찾을 수 없어요. build_data.py를 실행했는지 확인하세요.</div>'; return;
  }
  salesData = d;
  document.getElementById("sales-period").textContent =
    `${d.period.start} ~ ${d.period.end} (최근 ${d.period.days}일) · 갱신 ${d.generated_at.slice(0,16).replace("T"," ")}`;
  document.getElementById("updated").innerHTML = "데이터 갱신<br>" + d.generated_at.slice(0,16).replace("T"," ");

  const k = d.kpi;
  document.getElementById("sales-kpis").innerHTML = [
    ["총 매출", wonShort(k.total_sales)],
    ["전환수", k.conv_count.toLocaleString() + "건"],
    ["평균 객단가", won(k.aov)],
    ["환불율", k.refund_rate + "%"],
  ].map(([l,v]) => `<div class="kpi"><div class="label">${l}</div><div class="val">${v}</div></div>`).join("");

  // 파이 + 등락
  const nr = d.new_vs_repeat;
  new Chart(document.getElementById("pieChart"), {
    type:"doughnut",
    data:{labels:["신규 구매","재구매"],
      datasets:[{data:[nr.new_sales, nr.repeat_sales],
        backgroundColor:["#2F6FED","#16A085"], borderWidth:0}]},
    options:{cutout:"58%",plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>c.label+": "+won(c.raw)}}}}
  });
  const tot = nr.new_sales + nr.repeat_sales;
  document.getElementById("delta-card").innerHTML = `
    <div class="label" style="color:var(--muted);font-size:13px">직전 ${d.period.days}일(${nr.prev_period.start.slice(5)}~${nr.prev_period.end.slice(5)}) 대비</div>
    <div style="margin:14px 0">
      <div class="label" style="color:var(--muted);font-size:13px">신규 구매</div>
      <div class="val" style="font-size:22px">${won(nr.new_sales)} <span style="color:var(--muted);font-size:13px">(${Math.round(nr.new_sales/tot*100)}%)</span></div>
      ${deltaHtml(nr.new_delta_pct)}
    </div>
    <div>
      <div class="label" style="color:var(--muted);font-size:13px">재구매</div>
      <div class="val" style="font-size:22px">${won(nr.repeat_sales)} <span style="color:var(--muted);font-size:13px">(${Math.round(nr.repeat_sales/tot*100)}%)</span></div>
      ${deltaHtml(nr.repeat_delta_pct)}
    </div>`;

  // 일별 누적 + 메모
  const labels = d.daily.map(x => x.date);
  await loadMemos();
  drawDaily(d, labels);

  // 메모 날짜 셀렉트
  const sel = document.getElementById("memo-date");
  sel.innerHTML = labels.map(x => `<option value="${x}">${mmdd(x)}</option>`).join("");
  sel.value = labels[labels.length-1];
  document.getElementById("memo-add-btn").onclick = async () => {
    const date = sel.value, text = document.getElementById("memo-text").value.trim();
    if(!text) return;
    MEMOS[date] = text; await saveMemos();
    document.getElementById("memo-text").value = "";
    drawDaily(salesData, labels); renderMemoList(labels);
  };
  renderMemoList(labels);
  document.getElementById("memo-note").textContent =
    JSONBIN.binId ? "메모는 JSONBin에 저장돼 모두에게 공유됩니다."
                  : "⚠ JSONBin 설정이 비어 있어 메모가 이 브라우저에만 저장됩니다. 공유하려면 코드 상단 JSONBIN에 binId/apiKey를 넣으세요.";
}

function drawDaily(d, labels){
  const annotations = {};
  labels.forEach(ds => {
    if(MEMOS[ds]){
      annotations["m_"+ds] = {type:"line", scaleID:"x", value:mmdd(ds),
        borderColor:"#E0A800", borderWidth:1.5, borderDash:[4,4],
        label:{display:true, content:"📌 "+MEMOS[ds], position:"start",
          backgroundColor:"#FFF7E6", color:"#9A7B00", font:{size:11},
          borderColor:"#E0A800", borderWidth:1}};
    }
  });
  if(dailyChart) dailyChart.destroy();
  dailyChart = new Chart(document.getElementById("dailyChart"), {
    type:"bar",
    data:{labels:labels.map(mmdd),
      datasets:[
        {label:"신규구매", data:d.daily.map(x=>x.new), backgroundColor:"#2F6FED"},
        {label:"재구매", data:d.daily.map(x=>x.repeat), backgroundColor:"#16A085"}]},
    options:{responsive:true, maintainAspectRatio:true,
      scales:{x:{stacked:true,grid:{display:false}},
              y:{stacked:true,ticks:{callback:v=>wonShort(v)}}},
      plugins:{legend:{position:"top",align:"end"},
        annotation:{annotations},
        tooltip:{callbacks:{label:c=>c.dataset.label+": "+won(c.raw)}}}}
  });
}

function renderMemoList(labels){
  const active = Object.entries(MEMOS).filter(([d,t])=>t&&t.trim()).sort();
  const el = document.getElementById("memo-list");
  if(!active.length){ el.innerHTML = '<div class="note">아직 기록된 메모가 없어요.</div>'; return; }
  el.innerHTML = active.map(([d,t]) =>
    `<div class="memo-item"><span class="date">📌 ${d}</span><span>${t}</span>
     <button class="del" data-d="${d}">삭제</button></div>`).join("");
  el.querySelectorAll(".del").forEach(b => b.onclick = async () => {
    delete MEMOS[b.dataset.d]; await saveMemos();
    drawDaily(salesData, labels); renderMemoList(labels);
  });
}

/* ===== 메모 저장소 (JSONBin or localStorage) ===== */
let MEMOS = {};
async function loadMemos(){
  if(JSONBIN.binId && JSONBIN.apiKey){
    try{
      const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN.binId}/latest`,
        {headers:{"X-Master-Key":JSONBIN.apiKey}});
      const j = await r.json(); MEMOS = j.record?.memos || {};
    }catch(e){ MEMOS = {}; }
  } else {
    try{ MEMOS = JSON.parse(localStorage.getItem("memos")||"{}"); }catch(e){ MEMOS={}; }
  }
}
async function saveMemos(){
  if(JSONBIN.binId && JSONBIN.apiKey){
    try{
      await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN.binId}`,
        {method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN.apiKey},
         body:JSON.stringify({memos:MEMOS})});
    }catch(e){ console.error(e); }
  } else {
    localStorage.setItem("memos", JSON.stringify(MEMOS));
  }
}

/* ===== 상품 탭 ===== */
async function renderProduct(){
  let d;
  try { d = await getJSON("data/product.json"); } catch(e){
    document.getElementById("product").innerHTML = '<h1>상품 대시보드</h1><div class="empty">data/product.json을 찾을 수 없어요.</div>'; return;
  }
  document.getElementById("product-period").textContent =
    `${d.period.start} ~ ${d.period.end} (최근 ${d.period.days}일)`;

  const cat = d.category.by_amount;
  new Chart(document.getElementById("catChart"), {
    type:"doughnut",
    data:{labels:Object.keys(cat),
      datasets:[{data:Object.values(cat),
        backgroundColor:["#2F6FED","#16A085","#9AA0AC"],borderWidth:0}]},
    options:{cutout:"58%",plugins:{legend:{position:"bottom"},
      title:{display:true,text:"대분류 매출 비중"},
      tooltip:{callbacks:{label:c=>c.label+": "+won(c.raw)}}}}
  });
  const m = d.carrier_models;
  new Chart(document.getElementById("modelChart"), {
    type:"bar",
    data:{labels:Object.keys(m),
      datasets:[{data:Object.values(m),backgroundColor:"#2F6FED"}]},
    options:{plugins:{legend:{display:false},title:{display:true,text:"캐리어 모델별 매출"}},
      scales:{y:{ticks:{callback:v=>wonShort(v)}}}}
  });

  const rows = d.ranking.map((r,i) =>
    `<tr><td>${i+1}</td><td>${r.name}</td><td class="num">${r.qty.toLocaleString()}</td><td class="num">${won(r.amount)}</td></tr>`).join("");
  document.getElementById("rankTable").innerHTML =
    `<tr><th>#</th><th>상품명</th><th class="num">판매수량</th><th class="num">매출</th></tr>${rows}`;
}

/* ===== 재고 탭 ===== */
async function renderInventory(){
  let d;
  try { d = await getJSON("data/inventory.json"); } catch(e){
    document.getElementById("inventory").innerHTML = '<h1>재고 대시보드</h1><div class="empty">data/inventory.json을 찾을 수 없어요. (재고 불러오기 실행 필요)</div>'; return;
  }
  document.getElementById("inv-updated").textContent = "갱신 " + d.generated_at.slice(0,16).replace("T"," ");
  const s = d.summary;
  document.getElementById("inv-kpis").innerHTML = [
    ["총 품목 수", s.total + "개"],
    ["품절(재고 0)", s.out_of_stock + "개"],
    ["품절 임박(90일 내)", s.soon + "개"],
    ["부진 재고(30일 무판매)", s.stagnant + "개"],
  ].map(([l,v]) => `<div class="kpi"><div class="label">${l}</div><div class="val">${v}</div></div>`).join("");

  const soon = d.items.filter(r => r.stock>0 && r.sellout_days!==null && r.sellout_days<=90)
                      .sort((a,b)=>a.sellout_days-b.sellout_days);
  document.getElementById("soonTable").innerHTML = soon.length ?
    `<tr><th>상품</th><th>옵션</th><th class="num">재고</th><th class="num">일판매(30일)</th><th class="num">예상 소진일</th></tr>` +
    soon.map(r=>`<tr><td>${r.product}</td><td>${r.option}</td><td class="num">${r.stock}</td>
      <td class="num">${r.daily_30}</td><td class="num"><span class="pill red">${r.sellout_days}일</span></td></tr>`).join("")
    : '<tr><td>90일 내 품절 위험 품목이 없습니다. 👍</td></tr>';

  const stag = d.items.filter(r => r.stock>0 && r.daily_30===0).sort((a,b)=>b.stock-a.stock);
  document.getElementById("stagnantTable").innerHTML = stag.length ?
    `<tr><th>상품</th><th>옵션</th><th class="num">재고</th><th>판매중</th></tr>` +
    stag.map(r=>`<tr><td>${r.product}</td><td>${r.option}</td><td class="num">${r.stock}</td>
      <td>${r.selling?"○":"×"}</td></tr>`).join("")
    : '<tr><td>해당 품목이 없습니다.</td></tr>';
}

/* ===== 초기 로드 ===== */
renderSales();
renderProduct();
renderInventory();
</script>
</body>
</html>
